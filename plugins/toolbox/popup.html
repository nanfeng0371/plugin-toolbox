<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      min-height: 150px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f8fafc;
      color: #1e293b;
    }

    /* 头部 */
    .header {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      padding: 14px 18px;
      color: #fff;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header .version {
      font-size: 11px;
      opacity: 0.75;
      margin-top: 2px;
    }
    .header .hint {
      font-size: 11px;
      opacity: 0.6;
      margin-top: 6px;
    }

    /* 模块列表 */
    .module-list {
      padding: 12px 16px 16px;
    }
    .section-title {
      font-size: 11px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
      font-weight: 600;
    }
    .module-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 9px;
      margin-bottom: 6px;
      cursor: default;
      transition: all 0.15s ease;
    }
    .module-item:hover {
      border-color: #c7d2fe;
    }
    .module-item .m-icon {
      font-size: 22px;
      width: 32px;
      text-align: center;
      flex-shrink: 0;
    }
    .module-item .m-info {
      flex: 1;
      min-width: 0;
    }
    .module-item .m-name {
      font-size: 13px;
      font-weight: 500;
    }
    .module-item .m-desc {
      font-size: 11px;
      color: #94a3b8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Toggle Switch */
    .toggle-switch {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #cbd5e1;
      border-radius: 20px;
      transition: all 0.2s ease;
    }
    .toggle-slider::before {
      content: "";
      position: absolute;
      width: 16px;
      height: 16px;
      left: 2px;
      bottom: 2px;
      background: #fff;
      border-radius: 50%;
      transition: all 0.2s ease;
    }
    .toggle-switch input:checked + .toggle-slider {
      background: #4f46e5;
    }
    .toggle-switch input:checked + .toggle-slider::before {
      transform: translateX(16px);
    }

    /* 底部 */
    .footer {
      text-align: center;
      padding: 10px;
      font-size: 11px;
      color: #cbd5e1;
      border-top: 1px solid #e2e8f0;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🧰 插件工作箱</h1>
    <div class="version" id="popup-version">v0.0.0 · 模块化管理</div>
    <div class="hint">点击页面左侧按钮直接打开工作台</div>
  </div>

  <div class="module-list">
    <div class="section-title">已安装模块</div>
    <div id="module-list-container">
      <div style="text-align:center;color:#94a3b8;padding:16px;font-size:13px;">加载中...</div>
    </div>
  </div>

  <div class="footer">辅导老师效率工具箱</div>

  <script src="popup.js"></script>
</body>
</html>
