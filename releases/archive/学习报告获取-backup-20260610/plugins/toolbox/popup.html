<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f8fafc;
      color: #1e293b;
    }

    /* 头部 */
    .header {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      padding: 16px 18px;
      color: #fff;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header .version {
      font-size: 11px;
      opacity: 0.75;
      margin-top: 2px;
    }

    /* 快捷操作 */
    .quick-actions {
      padding: 12px 16px;
      display: flex;
      gap: 8px;
    }
    .quick-btn {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      background: #fff;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s ease;
      font-size: 13px;
      color: #334155;
    }
    .quick-btn:hover {
      border-color: #818cf8;
      box-shadow: 0 2px 8px rgba(99,102,241,0.12);
      transform: translateY(-1px);
    }
    .quick-btn .icon { font-size: 20px; display: block; margin-bottom: 4px; }
    .quick-btn .label { font-weight: 500; }

    /* 模块列表 */
    .module-list {
      padding: 0 16px 16px;
    }
    .section-title {
      font-size: 11px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
      font-weight: 600;
    }
    .module-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 9px;
      margin-bottom: 6px;
      cursor: default;
      transition: all 0.15s ease;
    }
    .module-item:hover {
      border-color: #c7d2fe;
    }
    .module-item .m-icon { font-size: 22px; width: 32px; text-align: center; }
    .module-item .m-info { flex: 1; min-width: 0; }
    .module-item .m-name { font-size: 13px; font-weight: 500; }
    .module-item .m-desc { font-size: 11px; color: #94a3b8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .module-item .m-status {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 20px;
      font-weight: 600;
      white-space: nowrap;
    }
    .status-available { background: #dcfce7; color: #16a34a; }
    .status-coming { background: #fef3c7; color: #d97706; }
    .status-active { background: #ede9fe; color: #7c3aed; }

    /* 底部 */
    .footer {
      text-align: center;
      padding: 10px;
      font-size: 11px;
      color: #cbd5e1;
      border-top: 1px solid #e2e8f0;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🧰 插件工作箱</h1>
    <div class="version">v1.0.0 · 统一入口</div>
  </div>

  <div class="quick-actions">
    <button class="quick-btn" id="btn-open-sidebar">
      <span class="icon">📋</span>
      <span class="label">打开工作台</span>
    </button>
    <button class="quick-btn" id="btn-settings">
      <span class="icon">⚙️</span>
      <span class="label">设置</span>
    </button>
  </div>

  <div class="module-list">
    <div class="section-title">已安装模块</div>
    <div id="module-list-container"></div>
  </div>

  <div class="footer">辅导老师效率工具箱</div>

  <script src="popup.js"></script>
</body>
</html>
